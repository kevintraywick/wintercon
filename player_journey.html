<!DOCTYPE html>
<html lang="en">
<head>
<script src="/sync.js"></script>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>WinterCon — Player Journey Map</title>
<style>
  :root{--navy:#2F5496;--navy2:#22406f;--gold:#e0a526;--red:#c0504d;
        --bg:#f4f5f7;--ink:#242424;--line:#e4e6ea;--label:#8a909a;
        --colw:230px;--railw:46px;}
  *{box-sizing:border-box;}
  html,body{margin:0;font-family:'Helvetica Neue',Arial,sans-serif;color:var(--ink);background:var(--bg);}

  /* ---- controls (bottom bar) ---- */
  #controls{max-width:1280px;margin:0 auto;padding:4px 22px 28px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;justify-content:flex-end;}
  .ctl{border:1px solid var(--line);background:#fbfbfa;border-radius:20px;padding:7px 14px;font:inherit;
       font-size:12.5px;cursor:pointer;color:#5b6169;font-weight:600;}
  .ctl.on{background:#2b2f36;border-color:#2b2f36;color:#fff;}

  /* ---- journey card ---- */
  #wrap{padding:22px 22px 12px;max-width:1280px;margin:0 auto;}
  .jcard{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;
         box-shadow:0 2px 10px rgba(20,30,50,.06);}

  /* persona band */
  .band{display:grid;grid-template-columns:290px 1.2fr 1fr;color:#fff;padding:22px 24px 20px;transition:background .3s;}
  .band .who{display:flex;align-items:center;gap:15px;}
  .avatar{width:78px;height:78px;min-width:78px;border-radius:50%;background:#fff;display:flex;align-items:center;
          justify-content:center;font-size:42px;border:3px solid rgba(255,255,255,.6);cursor:pointer;user-select:none;
          transition:transform .15s ease-out;}
  .avatar:hover{transform:scale(1.06);border-color:#fff;}
  .who b{font-size:21px;display:block;line-height:1.15;}
  .band h4{margin:0 0 6px;font-size:11.5px;letter-spacing:.11em;text-transform:uppercase;opacity:.8;}
  .band .col{padding:0 20px;border-left:1px solid rgba(255,255,255,.28);}
  .band .col p{margin:0;font-size:13px;line-height:1.55;}
  .band .col ul{margin:0;padding-left:17px;font-size:13px;line-height:1.6;}

  /* ---- the board ---- */
  .scrollzone{overflow-x:auto;scrollbar-width:thin;}
  .board{display:grid;grid-template-columns:var(--railw) repeat(13,var(--colw));padding:14px 18px 20px 0;
         width:max-content;transition:opacity .16s ease-out;}
  .rail{position:sticky;left:0;z-index:5;background:#fff;display:flex;align-items:center;justify-content:center;}
  .rail span{writing-mode:vertical-rl;transform:rotate(180deg);font-size:11.5px;letter-spacing:.12em;
             text-transform:uppercase;color:#2b2f36;font-weight:800;white-space:nowrap;}
  /* stage chevrons (3 phases) */
  .stg{position:relative;color:#fff;font-size:13.5px;font-weight:700;text-align:center;padding:12px 20px 12px 26px;
       margin:2px;display:flex;align-items:center;justify-content:center;line-height:1.25;min-height:44px;cursor:default;
       letter-spacing:.02em;text-transform:uppercase;
       clip-path:polygon(0 0, calc(100% - 14px) 0, 100% 50%, calc(100% - 14px) 100%, 0 100%, 14px 50%);}
  /* curve */
  .curvecell{grid-column:2 / -1;position:relative;height:270px;}
  .curvecell svg{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .quote{position:absolute;width:190px;margin-left:-95px;text-align:center;font-size:10.5px;line-height:1.35;
         color:#555;font-style:italic;pointer-events:none;}
  .railcurve{flex-direction:column;justify-content:space-between;padding:46px 0 44px;}
  .railcurve small{font-size:14px;line-height:1;}
  /* content cells */
  .cell{border-radius:9px;padding:10px 12px;margin:3px 4px;font-size:12.5px;line-height:1.5;background:#f7f8fa;}
  .cell.empty{background:transparent;}
  .cell.dot::before{content:'';display:inline-block;width:7px;height:7px;border-radius:50%;background:#E0353B;margin:0 7px 1px 0;}
  .phasestart{border-left:2px dashed #dfe2e7;}
  .notes textarea{width:calc(100% - 8px);min-height:52px;margin:3px 4px;font:inherit;font-size:12px;border:1px dashed #d7d9de;
                  border-radius:8px;padding:7px 10px;color:#444;resize:vertical;background:#fcfcfb;line-height:1.45;}
  .notes textarea:focus{outline:none;border-color:var(--gold);background:#fffdf4;}
  @media(max-width:760px){ .band{grid-template-columns:1fr;gap:14px;} .band .col{border-left:none;padding:0;} }
  @media print{
    #controls{display:none;}
    .scrollzone{overflow:visible;}
    body{zoom:.42;background:#fff;}
    .jcard{border:none;box-shadow:none;}
  }
</style>
</head>
<body>
<div id="wrap">
  <div class="jcard">
    <div class="band" id="band"></div>
    <div class="scrollzone" id="zone"><div class="board" id="board"></div></div>
  </div>
</div>

<div id="controls">

  <button class="ctl" onclick="window.print()">Print / PDF</button>

</div>

// ---------- state ----------
let cur='first';
const K='wincon_journey_notes';
let notes={}; try{notes=JSON.parse(localStorage.getItem(K)||'{}');}catch(e){}
const saveNotes=()=>{try{localStorage.setItem(K,JSON.stringify(notes));}catch(e){}};
const persona=id=>PERSONAS.find(p=>p.id===id);
const N=STAGES.length, COLW=230;
const mix=(hue,pct)=>`color-mix(in oklab, ${hue} ${pct}%, #eef0f4)`;

function renderBand(){
  const p=persona(cur);
  const band=document.getElementById('band');
  band.style.background=`linear-gradient(115deg, #14161d 0%, ${p.dark} 42%, ${p.color} 100%)`;
  band.innerHTML=`
    <div class="who">
      <div class="avatar" id="avatar" title="Next player">${p.em}</div>
      <div><b>${p.name}</b></div>
    </div>
    <div class="col"><h4>Scenario</h4><p>${p.desc}</p></div>
    <div class="col"><h4>Goals</h4><ul>${p.goals.map(g=>`<li>${g}</li>`).join('')}</ul></div>`;
  document.getElementById('avatar').addEventListener('click',()=>{
    const i=PERSONAS.findIndex(x=>x.id===cur);
    cur=PERSONAS[(i+1)%PERSONAS.length].id;
    renderAll();
  });
}

function curveHTML(){
  const p=persona(cur);
  const W=N*COLW, H=270, padT=56, padB=52;
  const x=i=>COLW*i+COLW/2;
  const y=c=>padT+(H-padT-padB)*(1-(c-1)/4);
  const pts=STAGES.map((st,i)=>({x:x(i),y:y(st.p[cur].c),c:st.p[cur].c}));
  let s='';
  for(let g=1;g<=5;g++) s+=`<line x1="0" y1="${y(g)}" x2="${W}" y2="${y(g)}" stroke="#f0f1f4" stroke-width="1"/>`;
  let ph='';STAGES.forEach((st,i)=>{if(i&&st.phase!==STAGES[i-1].phase)ph+=`<line x1="${COLW*i}" y1="10" x2="${COLW*i}" y2="${H-44}" stroke="#dfe2e7" stroke-width="1.5" stroke-dasharray="3 5"/>`;});
  s+=ph;
  let d=`M ${pts[0].x} ${pts[0].y}`;
  for(let i=0;i<N-1;i++){
    const p0=pts[Math.max(0,i-1)],p1=pts[i],p2=pts[i+1],p3=pts[Math.min(N-1,i+2)];
    d+=` C ${p1.x+(p2.x-p0.x)/6} ${p1.y+(p2.y-p0.y)/6}, ${p2.x-(p3.x-p1.x)/6} ${p2.y-(p3.y-p1.y)/6}, ${p2.x} ${p2.y}`;
  }
  s+=`<path d="${d} L ${W} ${H-padB+22} L 0 ${H-padB+22} Z" fill="${p.color}" opacity="0.05"/>`;
  s+=`<path d="${d}" fill="none" stroke="${p.color}" stroke-width="3" stroke-linejoin="round"/>`;
  let quotes='';
  pts.forEach((pt,i)=>{
    const above=pt.c<=3, stag=(i%2)*20;
    s+=`<line x1="${pt.x}" y1="${above?pt.y-9:pt.y+9}" x2="${pt.x}" y2="${above?pt.y-22-stag:pt.y+22+stag}" stroke="#c3c8cf" stroke-width="1" stroke-dasharray="2 3"/>`;
    s+=`<circle cx="${pt.x}" cy="${pt.y}" r="5.5" fill="${p.color}" stroke="#fff" stroke-width="2.5"/>`;
    s+=`<text x="${pt.x}" y="${H-12}" text-anchor="middle" font-size="10.5" font-weight="700" fill="#8a909a">${STAGES[i].title}</text>`;
    quotes+=`<div class="quote" style="left:${pt.x}px;${above?`bottom:${H-pt.y+26+stag}px`:`top:${pt.y+26+stag}px`}">${STAGES[i].p[cur].q}</div>`;
  });
  return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="${W}" height="${H}">${s}</svg>${quotes}`;
}

const rail=(txt,cls='')=>`<div class="rail ${cls}" style="min-height:${txt?txt.length*13+22:0}px"><span>${txt}</span></div>`;

function renderBoard(){
  const p=persona(cur);
  const board=document.getElementById('board');
  let h='';
  // stage chevrons — one per phase, spanning its columns
  h+=rail('Stages');
  const spans={}, order=[];
  STAGES.forEach(st=>{ if(!spans[st.phase])order.push(st.phase); spans[st.phase]=(spans[st.phase]||0)+1; });
  order.forEach((ph,i)=>{
    const t=45+Math.round(55*i/(order.length-1));
    h+=`<div class="stg" style="grid-column:span ${spans[ph]};background:color-mix(in oklab, ${p.color} ${t}%, #e9edf5)">${ph}</div>`;});
  const ps=i=>(i&&STAGES[i].phase!==STAGES[i-1].phase)?' phasestart':'';
  // the moment — above the chart
  h+=rail('The moment');
  STAGES.forEach((st,i)=>h+=`<div class="cell dot${ps(i)}">${st.p[cur].exp}</div>`);
  // emotions & thoughts curve
  h+=`<div class="rail railcurve"><small>❤️</small><span>Emotions &amp; Thoughts</span><small>⁉️</small></div>`;
  h+=`<div class="curvecell">${curveHTML()}</div>`;
  // touchpoints
  h+=rail('Touchpoints');
  STAGES.forEach((st,i)=>h+=`<div class="cell${ps(i)}" style="font-size:12px;background:#f4f6fa">${st.touch}</div>`);
  // motivations
  h+=rail('Motivations');
  STAGES.forEach((st,i)=>h+=`<div class="cell dot${ps(i)}" style="background:${mix(p.color,12)}">${st.p[cur].mot}</div>`);
  // pain points
  h+=rail('Pain points');
  STAGES.forEach((st,i)=>h+=`<div class="cell dot${ps(i)}" style="background:#ffe9e6">${st.p[cur].pain}</div>`);
  // opportunities
  h+=rail('Opportunities');
  STAGES.forEach((st,i)=>h+=`<div class="cell dot${ps(i)}" style="background:#e0f6e9">${st.p[cur].opp}</div>`);
  // not to miss
  h+=rail('Not to miss');
  STAGES.forEach((st,i)=>{const v=st.p[cur].miss;
    h+=v?`<div class="cell${ps(i)}" style="background:#ffefc9"><b style="color:var(--gold)">★</b> ${v}</div>`:`<div class="cell empty${ps(i)}"></div>`;});
  // organizer rows
  h+=rail('Our job','orgrail');
  STAGES.forEach((st,i)=>h+=`<div class="cell orgcell${ps(i)}" style="background:#eef2f6;font-size:12px">${st.job}</div>`);
  h+=rail('Partners','orgrail');
  STAGES.forEach((st,i)=>h+=`<div class="cell orgcell${ps(i)}" style="background:#f5f0fb;font-size:12px">${st.partner}</div>`);
  h+=rail('Notes','orgrail');
  STAGES.forEach(st=>{h+=`<div class="orgcell notes"><textarea data-st="${st.id}" placeholder="Working notes…">${(notes[st.id]||'').replace(/</g,'&lt;')}</textarea></div>`;});
  board.innerHTML=h;
  board.querySelectorAll('textarea[data-st]').forEach(ta=>ta.addEventListener('input',()=>{notes[ta.dataset.st]=ta.value;saveNotes();}));
  applyOrg();
}

function applyOrg(){
  const on=document.body.classList.contains('org');
  document.querySelectorAll('.orgrail,.orgcell').forEach(el=>el.style.display=on?'':'none');
}

function renderAll(){
  const board=document.getElementById('board');
  board.style.opacity=0;
  renderBand();
  setTimeout(()=>{renderBoard(); board.style.opacity=1;},80);
}

document.getElementById('orgToggle').addEventListener('click',e=>{
  document.body.classList.toggle('org');
  e.target.classList.toggle('on',document.body.classList.contains('org'));
  applyOrg();
});
renderAll();
</script>
